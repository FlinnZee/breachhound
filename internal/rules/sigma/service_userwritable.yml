title: Service Installed From a User-Writable Path
id: bh-0003-service-temp
status: stable
description: A new service whose image runs from a user-writable directory.
level: high
tags:
  - attack.persistence
  - attack.t1543.003
logsource:
  product: windows
  service: system
detection:
  selection:
    EventID: 7045
    ImagePath|contains:
      - '\Temp\'
      - '\AppData\'
      - '\Users\Public\'
      - '\ProgramData\'
  condition: selection
