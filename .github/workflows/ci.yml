name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Build (linux)
        run: go build ./...
      - name: Cross-compile (windows/amd64)
        env:
          GOOS: windows
          GOARCH: amd64
        run: go build -o breachhound.exe ./cmd/breachhound
